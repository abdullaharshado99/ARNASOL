<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                line-height: 1.6;
                color: #333333;
                margin: 0;
                padding: 0;
                background-color: #f5f5f5;
            }
            .email-container {
                max-width: 600px;
                margin: 20px auto;
                background: #ffffff;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            }
            .header {
                background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
                color: white;
                padding: 30px 20px;
                text-align: center;
            }
            .header h1 {
                margin: 0;
                font-size: 24px;
                font-weight: 600;
            }
            .header p {
                margin: 10px 0 0;
                opacity: 0.9;
                font-size: 16px;
            }
            .content {
                padding: 40px 30px;
                background: #1e293b;
            }
            .field {
                margin-bottom: 25px;
            }
            .field-label {
                font-size: 14px;
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #6366f1;
                font-weight: 600;
                margin-bottom: 5px;
            }
            .field-value {
                font-size: 18px;
                color: #1e293b;
                background: #f8fafc;
                padding: 12px 15px;
                border-radius: 8px;
                border-left: 4px solid #6366f1;
            }
            .message-box {
                background: #f8fafc;
                padding: 20px;
                border-radius: 8px;
                border-left: 4px solid #6366f1;
                margin-top: 10px;
                color: #475569;
                white-space: pre-wrap;
            }
            .footer {
                background: #1e293b;
                color: #94a3b8;
                padding: 20px;
                text-align: center;
                font-size: 14px;
            }
            .footer a {
                color: #6366f1;
                text-decoration: none;
            }
            .badge {
                display: inline-block;
                background: #10b981;
                color: white;
                padding: 5px 12px;
                border-radius: 20px;
                font-size: 12px;
                font-weight: 600;
                margin: 0 5px;
            }
        </style>
    </head>
    <body>
        <div class="email-container">
            <div class="header">
                <h1>ARNASOL - Powered by ARNA INDUSTRY</h1>
            </div>

            <div class="content">
                <div style="text-align: center; margin-bottom: 30px;">
                    <span class="badge">New Lead</span>
                    <span class="badge" style="background: #6366f1;">__DATE__</span>
                </div>

                <div class="field">
                    <div class="field-label">FULL NAME</div>
                    <div class="field-value">__NAME__</div>
                </div>

                <div class="field">
                    <div class="field-label">EMAIL ADDRESS</div>
                    <div class="field-value">
                        <a href="mailto:__EMAIL__" style="color: #6366f1; text-decoration: none;">__EMAIL__</a>
                    </div>
                </div>

                <!--PHONE_SECTION_START-->
                <div class="field">
                    <div class="field-label">PHONE NUMBER</div>
                    <div class="field-value">
                        <a href="tel:__PHONE__" style="color: #6366f1; text-decoration: none;">__PHONE__</a>
                    </div>
                </div>
                <!--PHONE_SECTION_END-->

                <div class="field">
                    <div class="field-label">MESSAGE</div>
                    <div class="message-box">
                        __MESSAGE__
                    </div>
                </div>

                <div style="background: #e0f2fe; padding: 15px; border-radius: 8px; margin-top: 30px;">
                    <p style="margin: 0; color: #0369a1; font-size: 14px;">
                        <strong>Response Time:</strong> We aim to respond within 24 hours.
                    </p>
                </div>
            </div>

            <div class="footer">
                <p style="margin: 0 0 10px;">© 2025 ARNA Technologies. All rights reserved.</p>
            </div>
        </div>
    </body>
</html>
